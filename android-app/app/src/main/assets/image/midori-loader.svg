<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <!-- Natural Soft Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />   <!-- Emerald -->
      <stop offset="100%" stop-color="#34D399" />  <!-- Mint -->
    </linearGradient>

    <!-- Drop Shadow Filter for maximum contrast -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Pulsing Background Ripple -->
  <circle cx="100" cy="100" r="25" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="25;75" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
    <animate attributeName="opacity" values="0.6;0" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
  </circle>

  <!-- Central Breathing Clover Loader -->
  <g transform="translate(100, 100)" filter="url(#glow)">
    <!-- Continuous Rotation + Scale Pulse -->
    <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="12s" repeatCount="indefinite" additive="sum" />
    <g>
      <animateTransform attributeName="transform" type="scale" values="0.88; 1.08; 0.88" dur="3.5s" repeatCount="indefinite" calcMode="spline" keyTimes="0; 0.5; 1" keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
      
      <!-- Four Clover Leaves (Symmetrical layout) -->
      <!-- Leaf 1 (Top) -->
      <path d="M 0 0 C -12 -15 -25 -10 -20 5 C -15 20 0 25 0 25 C 0 25 15 20 20 5 C 25 -10 12 -15 0 0 Z" fill="url(#leafGrad)" transform="rotate(0) translate(0, -22)" />
      
      <!-- Leaf 2 (Right) -->
      <path d="M 0 0 C -12 -15 -25 -10 -20 5 C -15 20 0 25 0 25 C 0 25 15 20 20 5 C 25 -10 12 -15 0 0 Z" fill="url(#leafGrad)" transform="rotate(90) translate(0, -22)" />
      
      <!-- Leaf 3 (Bottom) -->
      <path d="M 0 0 C -12 -15 -25 -10 -20 5 C -15 20 0 25 0 25 C 0 25 15 20 20 5 C 25 -10 12 -15 0 0 Z" fill="url(#leafGrad)" transform="rotate(180) translate(0, -22)" />
      
      <!-- Leaf 4 (Left) -->
      <path d="M 0 0 C -12 -15 -25 -10 -20 5 C -15 20 0 25 0 25 C 0 25 15 20 20 5 C 25 -10 12 -15 0 0 Z" fill="url(#leafGrad)" transform="rotate(270) translate(0, -22)" />

      <!-- Stem -->
      <path d="M 0 5 C 2 20 12 32 8 42" stroke="#059669" stroke-width="3" stroke-linecap="round" fill="none" />
    </g>
  </g>
</svg>
