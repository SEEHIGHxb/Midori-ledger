<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients, filters, and clips -->
  <defs>
    <!-- Bark Highlights -->
    <linearGradient id="barkHighlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b45309" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>

    <!-- Bark Shadows -->
    <linearGradient id="barkShadow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#022c22" />
      <stop offset="100%" stop-color="#047857" />
    </linearGradient>

    <!-- Moss & Leaves -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#6ee7b7" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Background Pulsing Mist Ripples (Calming loading indicators) -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#14b8a6" stroke-width="1" opacity="0">
    <animate attributeName="r" values="20;75" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
    <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
  </circle>
  
  <circle cx="100" cy="100" r="20" fill="none" stroke="#6ee7b7" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="20;75" dur="3s" begin="1.5s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
    <animate attributeName="opacity" values="0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
  </circle>

  <!-- 2. Central Miniature Ghibli Forest Scene (Breathes and sways) -->
  <!-- Anchored at the base of the trunk (100, 150) -->
  <g transform="translate(100, 150)">
    
    <!-- Gentle natural wind-sway and pulse loop -->
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="-3; 3; -3" 
      dur="6s" 
      repeatCount="indefinite" 
      calcMode="spline" 
      keyTimes="0; 0.5; 1" 
      keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" additive="sum" />

    <g>
      <!-- Slow, organic breathing scale pulse -->
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.96; 1.04; 0.96" 
        dur="5s" 
        repeatCount="indefinite" 
        calcMode="spline" 
        keyTimes="0; 0.5; 1" 
        keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />

      <!-- Curved Miniature Trunk -->
      <path d="M 0 0 C 15 -30 10 -60 5 -90 L -15 -90 C -10 -60 -15 -30 0 0 Z" fill="url(#barkShadow)" />
      <!-- Golden Highlight edge -->
      <path d="M 0 0 C 15 -30 10 -60 5 -90 L -5 -90 C 0 -60 -5 -30 0 0 Z" fill="url(#barkHighlight)" opacity="0.8" />

      <!-- Mossy base block -->
      <path d="M -15 0 C -5 -15 10 -15 15 0 Z" fill="url(#leafGrad)" opacity="0.8" />

      <!-- Hanging branch leaves at the top of trunk -->
      <g transform="translate(0, -90)" filter="url(#glow)">
        <circle cx="-10" cy="-10" r="25" fill="url(#leafGrad)" opacity="0.9" />
        <circle cx="15" cy="-15" r="20" fill="#34d399" opacity="0.4" />
        <circle cx="-5" cy="-25" r="18" fill="#6ee7b7" opacity="0.3" />
      </g>
    </g>
  </g>

  <!-- 3. Floating Bioluminescent Spores -->
  <g opacity="0.75" filter="url(#glow)">
    <circle cx="50" cy="80" r="1.5" fill="#fef08a">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="80;40;80" dur="6s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="110" r="2.0" fill="#a7f3d0">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="110;60;110" dur="8s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
