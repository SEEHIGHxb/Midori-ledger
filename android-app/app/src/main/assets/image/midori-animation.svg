<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <!-- Clover Foliage Gradient -->
    <linearGradient id="cloverGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />   <!-- Deep Forest Green -->
      <stop offset="50%" stop-color="#10B981" />  <!-- Vibrant Emerald -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Premium Mint Green -->
    </linearGradient>

    <!-- Stem & Stalk Gradient -->
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#045a43" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Falling Leaves Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#34D399" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="5" flood-color="#000000" flood-opacity="0.15" />
    </filter>
  </defs>

  <!-- ==================== BACKGROUND FLOATING LEAVES WITH DETAILED PETIOLES ==================== -->
  <!-- Fluttering Leaf 1 (Left - With curved petiole stem) -->
  <g>
    <animateMotion path="M 120 -50 C 90 100, 220 220, 100 350 S 200 480, 80 650" dur="14s" repeatCount="indefinite" rotate="auto" />
    <g>
      <animateTransform attributeName="transform" type="rotate" values="0; 360" dur="7s" repeatCount="indefinite" />
      <g transform="scale(1.2)">
        <!-- Leaf Blade -->
        <path d="M 0 0 C -8 -10 -15 -5 -10 5 C -5 12 5 10 0 0 Z" fill="url(#leafGrad)" opacity="0.45" />
        <!-- Petiole (Leaf Stalk) -->
        <path d="M 0 0 C 1 4 3 8 6 10" stroke="url(#stemGrad)" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5" />
      </g>
    </g>
  </g>

  <!-- Fluttering Leaf 2 (Right - With curved petiole stem) -->
  <g>
    <animateMotion path="M 680 -50 C 720 120, 580 260, 680 390 S 550 500, 640 650" dur="12s" repeatCount="indefinite" rotate="auto" />
    <g>
      <animateTransform attributeName="transform" type="rotate" values="360; 0" dur="6s" repeatCount="indefinite" />
      <g transform="scale(0.9)">
        <!-- Leaf Blade -->
        <path d="M 0 0 C 8 -10 15 -5 10 5 C 5 12 -5 10 0 0 Z" fill="url(#leafGrad)" opacity="0.35" />
        <!-- Petiole (Leaf Stalk) -->
        <path d="M 0 0 C -1 4 -3 8 -6 10" stroke="url(#stemGrad)" stroke-width="1.0" stroke-linecap="round" fill="none" opacity="0.4" />
      </g>
    </g>
  </g>


  <!-- ==================== MAIN FOUR-LEAF CLOVER CENTERPIECE ==================== -->
  <!-- Anchored at the base of the petiole stalk (400, 450) -->
  <g transform="translate(400, 450)">
    
    <!-- Gentle, natural wind sway loop anchored at local (0, 0) -->
    <animateTransform attributeName="transform" type="rotate"
      values="-3; 4; -3"
      dur="8s" repeatCount="indefinite"
      calcMode="spline" keyTimes="0; 0.5; 1"
      keySplines="0.44, 0.05, 0.55, 0.95; 0.44, 0.05, 0.55, 0.95" additive="sum" />

    <!-- Curved Clover Petiole Stalk -->
    <path d="M 0 0 C 15 -50 -5 -100 0 -150" stroke="url(#stemGrad)" stroke-width="6.5" stroke-linecap="round" fill="none" />

    <!-- The 4 leaflets centered at the top of the stalk (0, -150) -->
    <g transform="translate(0, -150)" filter="url(#dropShadow)">
      
      <!-- Leaflet 1 (Top, 0 deg) -->
      <g transform="rotate(0)">
        <!-- Heart-shaped lobe -->
        <path d="M 0 0 C -20 -35 -45 -30 -40 5 C -35 35 -10 15 0 0 C 10 15 35 35 40 5 C 45 -30 20 -35 0 0 Z" fill="url(#cloverGrad)" filter="url(#softGlow)" />
        <!-- Organic Vein Ribs -->
        <path d="M 0 0 L 0 -25" stroke="#ffffff" stroke-width="1.8" opacity="0.35" stroke-linecap="round" />
        <path d="M 0 -10 Q -12 -15 -18 -13 M 0 -16 Q -10 -21 -14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
        <path d="M 0 -10 Q 12 -15 18 -13 M 0 -16 Q 10 -21 14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
      </g>

      <!-- Leaflet 2 (Right, 90 deg) -->
      <g transform="rotate(90)">
        <path d="M 0 0 C -20 -35 -45 -30 -40 5 C -35 35 -10 15 0 0 C 10 15 35 35 40 5 C 45 -30 20 -35 0 0 Z" fill="url(#cloverGrad)" filter="url(#softGlow)" />
        <path d="M 0 0 L 0 -25" stroke="#ffffff" stroke-width="1.8" opacity="0.35" stroke-linecap="round" />
        <path d="M 0 -10 Q -12 -15 -18 -13 M 0 -16 Q -10 -21 -14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
        <path d="M 0 -10 Q 12 -15 18 -13 M 0 -16 Q 10 -21 14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
      </g>

      <!-- Leaflet 3 (Bottom, 180 deg) -->
      <g transform="rotate(180)">
        <path d="M 0 0 C -20 -35 -45 -30 -40 5 C -35 35 -10 15 0 0 C 10 15 35 35 40 5 C 45 -30 20 -35 0 0 Z" fill="url(#cloverGrad)" filter="url(#softGlow)" />
        <path d="M 0 0 L 0 -25" stroke="#ffffff" stroke-width="1.8" opacity="0.35" stroke-linecap="round" />
        <path d="M 0 -10 Q -12 -15 -18 -13 M 0 -16 Q -10 -21 -14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
        <path d="M 0 -10 Q 12 -15 18 -13 M 0 -16 Q 10 -21 14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
      </g>

      <!-- Leaflet 4 (Left, 270 deg) -->
      <g transform="rotate(270)">
        <path d="M 0 0 C -20 -35 -45 -30 -40 5 C -35 35 -10 15 0 0 C 10 15 35 35 40 5 C 45 -30 20 -35 0 0 Z" fill="url(#cloverGrad)" filter="url(#softGlow)" />
        <path d="M 0 0 L 0 -25" stroke="#ffffff" stroke-width="1.8" opacity="0.35" stroke-linecap="round" />
        <path d="M 0 -10 Q -12 -15 -18 -13 M 0 -16 Q -10 -21 -14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
        <path d="M 0 -10 Q 12 -15 18 -13 M 0 -16 Q 10 -21 14 -20" stroke="#ffffff" stroke-width="1.0" opacity="0.25" stroke-linecap="round" />
      </g>
    </g>
  </g>
</svg>
