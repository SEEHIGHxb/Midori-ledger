<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" width="100%" height="100%">
  <defs>
    <!-- Premium Emerald-to-Mint Gradient for MIDORI -->
    <linearGradient id="midoriGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />  <!-- Deep Emerald -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Mint -->
    </linearGradient>

    <!-- Premium Turquoise-to-Mint Gradient for Leafy Ledger -->
    <linearGradient id="leafyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D9488" />  <!-- Teal/Turquoise -->
      <stop offset="100%" stop-color="#2DD4BF" /> <!-- Light Turquoise -->
    </linearGradient>

    <!-- Natural Soft Leaf Gradient -->
    <linearGradient id="leafGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />   <!-- Medium Green -->
      <stop offset="100%" stop-color="#34D399" />  <!-- Mint Leaf -->
    </linearGradient>

    <!-- Drop Shadow Filter for perfect light/dark contrast -->
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.22" />
    </filter>
  </defs>

  <!-- Group with Soft Shadow Filter applied to everything for premium contrast -->
  <g filter="url(#softShadow)">
    
    <!-- ==================== LEFT BRAND MARK: SWAYING LEAF ==================== -->
    <g transform="translate(200, 150)">
      <!-- Standardized Wind Sway Cycle -->
      <g>
        <animateTransform attributeName="transform" type="rotate"
          values="-8 0 0; 8 0 0; -8 0 0"
          dur="4s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0; 0.5; 1"
          keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
        
        <!-- Minimalist Emerald Leaf Geometry -->
        <path d="M 0 45 C -45 25 -65 -20 -45 -65 C -25 -110 0 -130 0 -130 C 0 -130 25 -110 45 -65 C 65 -20 45 25 0 45 Z" fill="url(#leafGrad)" />
        
        <!-- Elegant Light Vein Detail -->
        <path d="M 0 45 C 0 15 0 -20 0 -115" stroke="#FFFFFF" stroke-width="3.5" stroke-linecap="round" opacity="0.32" fill="none" />
        
        <!-- Petite Sprouting Accent Leaf -->
        <g transform="scale(0.5) translate(-35, 15) rotate(-35)">
          <path d="M 0 45 C -45 25 -65 -20 -45 -65 C -25 -110 0 -130 0 -130 C 0 -130 25 -110 45 -65 C 65 -20 45 25 0 45 Z" fill="#2DD4BF" opacity="0.9" />
          <path d="M 0 45 C 0 15 0 -20 0 -115" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" opacity="0.4" fill="none" />
        </g>
      </g>
    </g>

    <!-- ==================== RIGHT TYPOGRAPHY: ROLL-UP TRANSITION ==================== -->
    <!-- 1. MIDORI TEXT GROUP -->
    <g>
      <!-- Kinetic Translation Loop -->
      <animateTransform attributeName="transform" type="translate"
        values="0 40; 0 0; 0 0; 0 -40; 0 -40; 0 40"
        dur="8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0; 0.05; 0.375; 0.5; 0.875; 1"
        keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
      
      <text x="300" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" letter-spacing="16" fill="url(#midoriGrad)">
        MIDORI
        <!-- Opacity Cross-Fade Loop -->
        <animate attributeName="opacity"
          values="0; 1; 1; 0; 0; 0"
          dur="8s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0; 0.05; 0.375; 0.5; 0.875; 1"
          keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
      </text>
    </g>

    <!-- 2. LEAFY LEDGER TEXT GROUP -->
    <g>
      <!-- Kinetic Translation Loop (offset phase) -->
      <animateTransform attributeName="transform" type="translate"
        values="0 -40; 0 40; 0 40; 0 0; 0 0; 0 -40"
        dur="8s" repeatCount="indefinite"
        calcMode="spline" keyTimes="0; 0.05; 0.375; 0.5; 0.875; 1"
        keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
      
      <text x="300" y="172" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="800" letter-spacing="4" fill="url(#leafyGrad)">
        Leafy Ledger
        <!-- Opacity Cross-Fade Loop (offset phase) -->
        <animate attributeName="opacity"
          values="0; 0; 0; 1; 1; 0"
          dur="8s" repeatCount="indefinite"
          calcMode="spline" keyTimes="0; 0.05; 0.375; 0.5; 0.875; 1"
          keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />
      </text>
    </g>
    
  </g>
</svg>
