<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Definitions for gradients, filters, and clips -->
  <defs>
    <!-- Clover Foliage Gradient -->
    <linearGradient id="cloverGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#047857" />   <!-- Deep Forest Green -->
      <stop offset="50%" stop-color="#10B981" />  <!-- Vibrant Emerald -->
      <stop offset="100%" stop-color="#34D399" /> <!-- Premium Mint Green -->
    </linearGradient>

    <!-- Stem & Stalk Gradient -->
    <linearGradient id="stemGrad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#045a43" />
      <stop offset="100%" stop-color="#10B981" />
    </linearGradient>

    <!-- Soft Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- 1. Background Pulsing Green Ripples (Calming loading indicators) -->
  <circle cx="100" cy="100" r="20" fill="none" stroke="#10B981" stroke-width="1" opacity="0">
    <animate attributeName="r" values="20;75" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
    <animate attributeName="opacity" values="0.5;0" dur="3s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
  </circle>
  
  <circle cx="100" cy="100" r="20" fill="none" stroke="#34D399" stroke-width="1.5" opacity="0">
    <animate attributeName="r" values="20;75" dur="3s" begin="1.5s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
    <animate attributeName="opacity" values="0.5;0" dur="3s" begin="1.5s" repeatCount="indefinite"
             calcMode="spline" keyTimes="0;1" keySplines="0.16, 1, 0.3, 1" />
  </circle>

  <!-- 2. Central Miniature 4-Leaf Clover (Breathes and sways) -->
  <!-- Anchored at the base of its stalk at (100, 140) -->
  <g transform="translate(100, 140)">
    
    <!-- Gentle, natural sway and breathing pulse loop -->
    <animateTransform 
      attributeName="transform" 
      type="rotate" 
      values="-4; 4; -4" 
      dur="5s" 
      repeatCount="indefinite" 
      calcMode="spline" 
      keyTimes="0; 0.5; 1" 
      keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" additive="sum" />

    <g>
      <!-- Slow, organic breathing scale pulse -->
      <animateTransform 
        attributeName="transform" 
        type="scale" 
        values="0.95; 1.05; 0.95" 
        dur="4s" 
        repeatCount="indefinite" 
        calcMode="spline" 
        keyTimes="0; 0.5; 1" 
        keySplines="0.4, 0, 0.2, 1; 0.4, 0, 0.2, 1" />

      <!-- Curved Clover Stalk -->
      <path d="M 0 0 C 4 -12 -2 -25 0 -40" stroke="url(#stemGrad)" stroke-width="2.5" stroke-linecap="round" fill="none" />

      <!-- The 4 leaflets centered at the top of the stalk (0, -40) -->
      <g transform="translate(0, -40)">
        
        <!-- Leaflet 1 (Top, 0 deg) -->
        <g transform="rotate(0)">
          <path d="M 0 0 C -6 -11 -14 -9 -12 2 C -10 10 -3 4 0 0 C 3 4 10 10 12 2 C 14 -9 6 -11 0 0 Z" fill="url(#cloverGrad)" filter="url(#glow)" />
          <path d="M 0 0 L 0 -8" stroke="#ffffff" stroke-width="0.8" opacity="0.4" stroke-linecap="round" />
        </g>

        <!-- Leaflet 2 (Right, 90 deg) -->
        <g transform="rotate(90)">
          <path d="M 0 0 C -6 -11 -14 -9 -12 2 C -10 10 -3 4 0 0 C 3 4 10 10 12 2 C 14 -9 6 -11 0 0 Z" fill="url(#cloverGrad)" filter="url(#glow)" />
          <path d="M 0 0 L 0 -8" stroke="#ffffff" stroke-width="0.8" opacity="0.4" stroke-linecap="round" />
        </g>

        <!-- Leaflet 3 (Bottom, 180 deg) -->
        <g transform="rotate(180)">
          <path d="M 0 0 C -6 -11 -14 -9 -12 2 C -10 10 -3 4 0 0 C 3 4 10 10 12 2 C 14 -9 6 -11 0 0 Z" fill="url(#cloverGrad)" filter="url(#glow)" />
          <path d="M 0 0 L 0 -8" stroke="#ffffff" stroke-width="0.8" opacity="0.4" stroke-linecap="round" />
        </g>

        <!-- Leaflet 4 (Left, 270 deg) -->
        <g transform="rotate(270)">
          <path d="M 0 0 C -6 -11 -14 -9 -12 2 C -10 10 -3 4 0 0 C 3 4 10 10 12 2 C 14 -9 6 -11 0 0 Z" fill="url(#cloverGrad)" filter="url(#glow)" />
          <path d="M 0 0 L 0 -8" stroke="#ffffff" stroke-width="0.8" opacity="0.4" stroke-linecap="round" />
        </g>
      </g>
    </g>
  </g>

  <!-- 3. Floating glowing sparkles -->
  <g opacity="0.6">
    <circle cx="50" cy="60" r="1" fill="#34D399">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="3s" repeatCount="indefinite" />
      <animate attributeName="cy" values="60;45;60" dur="5s" repeatCount="indefinite" />
    </circle>
    <circle cx="150" cy="140" r="1.2" fill="#10B981">
      <animate attributeName="opacity" values="0.1;0.9;0.1" dur="4s" repeatCount="indefinite" />
      <animate attributeName="cy" values="140;155;140" dur="6s" repeatCount="indefinite" />
    </circle>
  </g>
</svg>
